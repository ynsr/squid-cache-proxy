############################
# HOSTNAME
############################
visible_hostname r6s-squid-proxy

############################
# PORTS & SSL BUMP
############################
http_port 3128 ssl-bump \
    cert=/etc/squid/ssl/squid-ca.crt \
    key=/etc/squid/ssl/squid-ca.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=32MB

# SSL certificate generator
sslcrtd_program /usr/lib/squid/security_file_certgen \
    -s /var/lib/squid/ssl_db/ssl_db -M 16MB
sslcrtd_children 8 startup=2 idle=2

# SSL bump steps
acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

# Domains that should NOT be intercepted
acl no_bump_domains dstdomain \
    .bale.ai \
    .whatsapp.com \
    .telegram.org \
    .paypal.com \
    .bank \
    .google.com

# SSL bumping strategy
ssl_bump peek step1
ssl_bump splice no_bump_domains
ssl_bump stare step2
ssl_bump bump all

# TLS compatibility
sslproxy_cert_error allow all
tls_outgoing_options options=NO_SSLv3,SINGLE_DH_USE,SINGLE_ECDH_USE

############################
# UPSTREAM PROXY (V2Ray)
############################
cache_peer 192.168.88.100 parent 10808 0 no-query default \
    login=PASSTHRU connection-auth=off

never_direct allow all
always_direct deny all

############################
# ACCESS CONTROL
############################
acl localnet src 192.168.88.0/24
acl localhost src 127.0.0.1/32
acl SSL_ports port 443
acl Safe_ports port 80 443 8080 1025-65535
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access allow localhost
http_access deny all

############################
# DNS SETTINGS
############################
dns_nameservers 1.1.1.1 8.8.8.8

############################
# PERFORMANCE TUNING
############################
cache_mem 1 GB
maximum_object_size_in_memory 50 MB
maximum_object_size 512 MB
minimum_object_size 0 KB

# Disk cache (adjust size based on available storage)
cache_dir aufs /var/spool/squid 200000 16 256

memory_replacement_policy heap GDSF
cache_replacement_policy heap LFUDA
collapsed_forwarding on

client_persistent_connections on
server_persistent_connections on

############################
# STOREID (DEDUPLICATION)
############################
store_id_program /usr/lib/squid/storeid_file_rewrite /etc/squid/storeid.conf
store_id_children 5 startup=1 idle=1
store_id_access allow all

############################
# CACHEABLE CONTENT ACLS
############################
acl static_assets urlpath_regex -i \
    \.(js|css|woff|woff2|ttf|eot|otf)(\?.*)?$ \
    \.(jpg|jpeg|png|gif|webp|svg|ico|bmp)(\?.*)?$ \
    \.(mp4|mkv|avi|mov|wmv|flv|ts)(\?.*)?$ \
    \.(zip|tar|gz|bz2|xz|rar|7z|iso|deb|apk|exe|msi)(\?.*)?$

acl api_requests urlpath_regex -i (/api/|/v[0-9]+/)

############################
# FORCE CACHING (CAUTIOUS)
############################
reply_header_replace Vary ""
reply_header_replace Cache-Control "public, max-age=86400"
reply_header_access Pragma deny static_assets
vary_ignore_expire on

refresh_all_ims on

############################
# CACHE DECISIONS
############################
cache allow static_assets
cache allow api_requests
cache deny all

############################
# REFRESH PATTERNS
############################
refresh_pattern -i \.(js|css)(\?.*)?$ \
    1440 80% 10080 \
    override-expire override-lastmod ignore-private ignore-auth

refresh_pattern -i \.(woff|woff2|ttf|eot|otf)(\?.*)?$ \
    10080 90% 43200 \
    override-expire override-lastmod ignore-private ignore-auth

refresh_pattern -i \.(jpg|jpeg|png|gif|webp|ico|svg|bmp)(\?.*)?$ \
    10080 90% 43200 \
    override-expire override-lastmod ignore-private ignore-auth

refresh_pattern -i \.(mp4|mkv|avi|mov|wmv|flv|ts)(\?.*)?$ \
    43200 90% 129600 \
    override-expire override-lastmod ignore-private ignore-auth

# API responses – shorter caching
refresh_pattern -i (/api/|/v[0-9]+/) \
    5 50% 1440 \
    override-expire ignore-private

# Avoid caching dynamic HTML
refresh_pattern -i \.(html|htm)(\?.*)?$ 0 0% 0
refresh_pattern . 60 20% 4320

############################
# LOGGING
############################
logformat custom %ts.%03tu %>a %Ss/%03>Hs %<st %rm %ru %Sh/%<A %mt
access_log stdio:/var/log/squid/access.log custom
cache_log stdio:/var/log/squid/cache.log
cache_store_log stdio:/var/log/squid/store.log
logfile_rotate 7

############################
# PRIVACY & SECURITY
############################
forwarded_for delete
via off
request_header_access X-Forwarded-For deny all
request_header_access Via deny all

############################
# CONNECTION & TIMEOUTS
############################
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 30 seconds
persistent_request_timeout 1 minute
shutdown_lifetime 3 seconds

############################
# MISC
############################
pipeline_prefetch on
range_offset_limit -1
