# ── HOSTNAME ──────────────────────────────────────────────────────
visible_hostname r6s-squid-proxy

# ── PORTS ─────────────────────────────────────────────────────────
http_port 3128 ssl-bump \
    cert=/etc/squid/ssl/squid-ca.crt \
    key=/etc/squid/ssl/squid-ca.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB

# ── SSL CERT GENERATOR ────────────────────────────────────────────
sslcrtd_program /usr/lib/squid/security_file_certgen \
    -s /var/lib/squid/ssl_db/ssl_db -M 4MB
sslcrtd_children 8 startup=1 idle=1

# ── SSL BUMP STEPS ────────────────────────────────────────────────
acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

# Domains to SPLICE (never decrypt) — websockets, banking, pinned certs
acl no_bump_domains dstdomain \
    .bale.ai \
    .whatsapp.com \
    .telegram.org \
    .paypal.com

# Peek at SNI in ClientHello
ssl_bump peek step1

# Splice domains that shouldn't be bumped (websockets etc.)
ssl_bump splice no_bump_domains

# Stare at server cert for everything else
ssl_bump stare step2

# Bump (decrypt + cache) everything else
ssl_bump bump all

# ── SSL OPTIONS ───────────────────────────────────────────────────
sslproxy_cert_error allow all
tls_outgoing_options flags=DONT_VERIFY_PEER

# ── UPSTREAM PROXY ────────────────────────────────────────────────
cache_peer 192.168.88.100 parent 10808 0 no-query no-digest default
never_direct allow all

# ── ACCESS CONTROL ────────────────────────────────────────────────
acl localnet src 192.168.88.0/24
acl localnet src 127.0.0.1/32
acl SSL_ports port 443
acl Safe_ports port 80 443 8080 1025-65535
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access allow localhost
http_access deny all

# ── WHAT TO CACHE ─────────────────────────────────────────────────
acl cacheable_content urlpath_regex -i \
    \.(js|css|woff|woff2|ttf|eot|otf)(\?.*)?$ \
    \.(mp4|mkv|avi|mov|wmv|flv|ts|m3u8)(\?.*)?$ \
    \.(jpg|jpeg|png|gif|webp|svg|ico|bmp)(\?.*)?$

acl no_cache_content urlpath_regex -i \
    \.(html|htm|php|asp|aspx)(\?.*)?$ \
    \.(zip|tar|gz|bz2|xz|rar|7z|iso|deb|apk|exe|msi)(\?.*)?$

cache deny no_cache_content
cache allow cacheable_content
cache deny all

# ── CACHE STORAGE ─────────────────────────────────────────────────
cache_mem 1 GB
maximum_object_size_in_memory 10 MB
cache_dir ufs /var/spool/squid 200000 16 256
maximum_object_size 50 MB
minimum_object_size 1 KB
cache_replacement_policy heap LFUDA

# ── REFRESH PATTERNS ──────────────────────────────────────────────
refresh_pattern -i \.(js|css)(\?.*)?$                         1440  80%  10080  override-expire ignore-private
refresh_pattern -i \.(woff|woff2|ttf|eot|otf)(\?.*)?$        10080 90%  43200  override-expire
refresh_pattern -i \.(jpg|jpeg|png|gif|webp|ico|svg|bmp)(\?.*)?$ 10080 90% 43200 override-expire ignore-private
refresh_pattern -i \.(mp4|mkv|avi|mov|wmv|flv|ts|m3u8)(\?.*)?$ 10080 90% 43200 override-expire ignore-private
refresh_pattern -i \.(html|htm)(\?.*)?$                       0     0%   0
refresh_pattern .                                              0     20%  4320

# ── LOGGING ───────────────────────────────────────────────────────
access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log
cache_store_log none
logfile_rotate 7

# ── MISC ──────────────────────────────────────────────────────────
forwarded_for off
via off
dns_nameservers 1.1.1.1 8.8.8.8
shutdown_lifetime 3 seconds
